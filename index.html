<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>极简密码生成器</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        #password { font-size: 1.5rem; color: #333; margin: 1.5rem 0; padding: 10px; background: #eee; border-radius: 4px; word-break: break-all; min-height: 1.5em; }
        button { background: #2ea44f; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #2c974b; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔐 随机密码生成器</h2>
        <div id="password">点击下方生成</div>
        <button onclick="generate()">生成新密码</button>
    </div>

    <script>
        function generate() {
            const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
            let retVal = "";
            for (let i = 0; i < 16; ++i) {
                retVal += charset.charAt(Math.floor(Math.random() * charset.length));
            }
            document.getElementById("password").innerText = retVal;
        }
    </script>
</body>
</html>
